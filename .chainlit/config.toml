[project]
# LegalRAG Chat Interface
enable_telemetry = false

[features]
prompt_playground = false
spontaneous_file_upload.enabled = true
spontaneous_file_upload.accept = ["application/pdf", "application/msword", "application/vnd.openxmlformats-officedocument.wordprocessingml.document", "text/plain", "application/zip", "application/x-rar-compressed"]
spontaneous_file_upload.max_files = 5
spontaneous_file_upload.max_size_mb = 20

[features.audio]
enabled = false

[UI]
name = "LegalRAG"
description = "AI-ассистент по российскому праву"
default_collapse_content = true
hide_cot = false
custom_css = "/public/theme.css"

[UI.theme]
layout = "wide"
font_family = "Inter, system-ui, -apple-system, sans-serif"

[UI.theme.light]
background = "#f1f5f9"
paper = "#ffffff"
primary = "#1d4ed8"
secondary = "#64748b"

[UI.theme.dark]
background = "#0c1929"
paper = "#162338"
primary = "#3b82f6"
secondary = "#94a3b8"

[meta]
generated_by = "LegalRAG v5.0"
