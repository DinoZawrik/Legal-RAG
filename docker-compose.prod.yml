# =============================================================================
# LegalRAG - Production Docker Compose Configuration
# =============================================================================

version: '3.8'

# Global logging configuration anchor
x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "100m"     # Больший размер для production
      max-file: "5"        # Больше файлов для production
      compress: "true"     # Сжатие старых логов

services:
  # =============================================================================
  # INFRASTRUCTURE SERVICES
  # =============================================================================
  
  postgres:
    image: postgres:16-alpine
    container_name: legal_rag_postgres_prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-legal_rag_db}
      POSTGRES_USER: ${POSTGRES_USER:-legal_rag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --locale=C
    ports:
      - "127.0.0.1:5432:5432"  # Bind only to localhost for security
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups/postgres:/backups
    networks:
      - legal_rag_network
    <<: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legal_rag_user} -d ${POSTGRES_DB:-legal_rag_db}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: legal_rag_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-your_redis_password} --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"  # Bind only to localhost for security
    volumes:
      - redis_data:/data
      - ./backups/redis:/backups
    networks:
      - legal_rag_network
    <<: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
        reservations:
          memory: 256M
          cpus: '0.1'
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-your_redis_password}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  chromadb:
    image: chromadb/chroma:1.0.15
    container_name: legal_rag_chromadb_prod
    restart: always
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"  # Disable telemetry in production
      CHROMA_SERVER_AUTHN_CREDENTIALS_FILE: /chroma/credentials
      CHROMA_SERVER_AUTHN_PROVIDER: basic
    ports:
      - "127.0.0.1:8000:8000"  # Bind only to localhost for security
    volumes:
      - chroma_data:/chroma/chroma
      - ./backups/chromadb:/backups
    networks:
      - legal_rag_network
    <<: *default-logging
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # APPLICATION SERVICES
  # =============================================================================

  legal_rag-microservices:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        - BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
        - BUILD_VERSION=v4.0
    container_name: legal_rag_microservices_prod
    restart: always
    env_file:
      - .env.production
    ports:
      - "8080:8080"  # API Gateway port
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 100M
    networks:
      - legal_rag_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '2.0'
        reservations:
          memory: 1.5G
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  legal_rag-telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        - BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
        - BUILD_VERSION=v4.0
    container_name: legal_rag_telegram_bot_prod
    restart: always
    env_file:
      - .env.production
    command: ["python", "run_bot.py"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 100M
    networks:
      - legal_rag_network
    depends_on:
      legal_rag-microservices:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]  # Simple Python health check
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # =============================================================================
  # REVERSE PROXY (OPTIONAL)
  # =============================================================================

  nginx:
    image: nginx:1.25-alpine
    container_name: legal_rag_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - legal_rag_network
    depends_on:
      - legal_rag-microservices
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 64M
          cpus: '0.05'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # MONITORING (OPTIONAL)
  # =============================================================================

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: legal_rag_prometheus_prod
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - legal_rag_network
    <<: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
        reservations:
          memory: 256M
          cpus: '0.1'
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.1.0
    container_name: legal_rag_grafana_prod
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=your_grafana_admin_password
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    networks:
      - legal_rag_network
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'
    profiles:
      - monitoring

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  legal_rag_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
device: ${DATA_PATH:-/opt/legal_rag/data}/postgres
      o: bind
      
  redis_data:
    driver: local
    driver_opts:
      type: none
device: ${DATA_PATH:-/opt/legal_rag/data}/redis
      o: bind
      
  chroma_data:
    driver: local
    driver_opts:
      type: none
device: ${DATA_PATH:-/opt/legal_rag/data}/chromadb
      o: bind
      
  prometheus_data:
    driver: local
    driver_opts:
      type: none
device: ${DATA_PATH:-/opt/legal_rag/data}/prometheus
      o: bind
      
  grafana_data:
    driver: local
    driver_opts:
      type: none
device: ${DATA_PATH:-/opt/legal_rag/data}/grafana
      o: bind